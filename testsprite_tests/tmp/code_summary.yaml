version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js
  - Tailwind CSS
  - Radix UI
  - Supabase
routes:
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: Login page
  - path: /app/alunos
    file: src/app/app/(authenticated)/alunos/page.tsx
    auth_required: true
    description: Student management page
  - path: /app/treinos
    file: src/app/app/(authenticated)/treinos/page.tsx
    auth_required: true
    description: Workout management page
  - path: /app/pagamentos
    file: src/app/app/(authenticated)/pagamentos/page.tsx
    auth_required: true
    description: Payments and billing
features:
  - name: Student Management
    description: Create, edit, and list gym students
    files:
      - src/app/app/(authenticated)/alunos/page.tsx
      - src/components/alunos/student-modal.tsx
    entry_route: /app/alunos
    user_interactions:
      - Click "Adicionar Aluno"
      - Fill form (Name, CPF, Phone, Address)
      - Click Save
    auth_required: true
  - name: Workout Management
    description: Create and assign workouts to students
    files:
      - src/app/app/(authenticated)/treinos/page.tsx
      - src/components/treinos/workout-modal.tsx
    entry_route: /app/treinos
    user_interactions:
      - Select student
      - Add exercises
      - Define sets/reps
      - Click Save
    auth_required: true
known_limitations: []
